<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div id="container">
        <header aria-label="Cabeçario">
            <h1>
                <img src="assets/images/tarefaHeader.gif" alt="Imagem Adicionar Tarefas">Tarefas
            </h1>
        </header>

        <main aria-label="Conteúdo Principal">
            <section class="form-section" aria-label="Seção da adição de tarefas">
                <input type="text" name="titulo" id="titulo" placeholder="Título"><br>
                
                <input type="text" name="descricao" id="descricao" placeholder="Descrição"><br>
                
                <input type="date" name="data" id="data"><br>
                <!--Adicionar Tarefa-->
                <button onclick="adicionarTarefa()">Adicionar Tarefa</button>
            </section>

            <section class="lista-section" aria-label="Seção de Listagem">
                <h2><img src="assets/images/tarefaMain.gif" alt="Imagem Lista de tarefas">Lista</h2>

                <ul id="lista" aria-label="Lista de tarefas"></ul>
            </section>
        </main>
        <footer>
        <p>João Felipe - <span id="ano"></span></p>
        </footer>
    </div>
    <script src="helpers/scripts.js"></script>
</body>
</html>
